<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bowl and Theory — Poster Builder</title>
<meta property="og:title" content="Bowl and Theory — Do Your Own Poster">
<meta property="og:description" content="Bowl and Theory poster builder. Roll the ball to scatter the pins and create your own unique poster.">

<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Bowl and Theory — Do Your Own Poster">
<meta name="twitter:description" content="Bowl and Theory poster builder by Code and Theory.">

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  :root {
    --ui-bg: #1a1a1a;
    --ui-surface: #2E2E2E;
    --ui-border: #3a3a3a;
    --ui-text: #e0e0e0;
    --ui-text-dim: #666;
    --ui-accent: #FF1100;
    --sidebar-w: 360px;
  }

  body {
    font-family: "Inter", system-ui, sans-serif;
    background: var(--ui-bg);
    color: var(--ui-text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Sidebar */
  aside {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--ui-surface);
    padding: 40px 36px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sidebar-header {
    margin-bottom: 0;
  }

  .sidebar-header h1 {
    font-size: 48px;
    font-weight: 900;
    line-height: 1.0;
    color: #fff;
    letter-spacing: -0.03em;
  }

  /* Bowling ball + Roll button */
  .roll-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    padding: 0;
  }

  .bowling-ball {
    width: 240px;
    height: 240px;
    position: relative;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.3s;
    filter: drop-shadow(0 8px 40px rgba(255, 17, 0, 0.25));
  }
  .bowling-ball:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 16px 60px rgba(255, 17, 0, 0.45));
  }
  .bowling-ball:active {
    transform: scale(0.95);
  }
  .bowling-ball.rolling {
    animation: rollBall 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes rollBall {
    0% { transform: scale(1) rotate(0deg); }
    30% { transform: scale(0.85) rotate(-15deg); }
    60% { transform: scale(1.1) rotate(10deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .ball-svg {
    width: 100%;
    height: 100%;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .btn {
    flex: 1;
    padding: 11px 16px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    background: transparent;
    color: rgba(255,255,255,0.6);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
  }
  .btn:hover { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.05); color: #fff; }

  .btn-primary {
    background: #fff;
    color: #000;
    border-color: #fff;
  }
  .btn-primary:hover { opacity: 0.9; background: #fff; color: #000; }

  .spacer { flex: 1; }

  .credit {
    margin-top: 8px;
  }
  .credit svg {
    width: 100%;
    max-width: 120px;
    opacity: 0.35;
  }

  /* Workspace */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    position: relative;
    background: var(--ui-bg);
  }

  /* Poster wrapper — scales to fit viewport */
  .poster-wrapper {
    position: relative;
    box-shadow: 0 20px 80px rgba(0,0,0,0.6);
  }

  /* Poster canvas */
  #poster {
    position: relative;
    overflow: hidden;
    background: #000;
    /* Internal coordinate system: 2180×2906 */
  }

  #poster svg {
    position: absolute;
    display: block;
  }

  /* Pin elements */
  .pin {
    position: absolute;
    transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    transform-origin: 50% 70%;
    will-change: transform;
  }
  .pin.scatter {
    transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .pin:nth-child(1).scatter { transition-duration: 0.9s; }
  .pin:nth-child(2).scatter { transition-duration: 1.1s; }
  .pin:nth-child(3).scatter { transition-duration: 1.0s; }
  .pin:nth-child(4).scatter { transition-duration: 0.85s; }

  /* Reset: lift pins up off screen */
  .pin.lift-out {
    transition: transform 0.5s cubic-bezier(0.55, 0, 1, 0.45),
                opacity 0.3s ease 0.2s;
    opacity: 0;
  }

  /* Reset: drop pins back in from above — no transition so we can set start position instantly */
  .pin.above {
    transition: none;
    opacity: 0;
  }

  /* Reset: drop into place */
  .pin.drop-in {
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.3s ease;
    opacity: 1;
  }
  .pin:nth-child(1).drop-in { transition-delay: 0s; }
  .pin:nth-child(2).drop-in { transition-delay: 0.06s; }
  .pin:nth-child(3).drop-in { transition-delay: 0.12s; }
  .pin:nth-child(4).drop-in { transition-delay: 0.18s; }

  /* ─── Mobile ─── */
  @media (max-width: 768px) {
    body {
      flex-direction: column;
      overflow-y: auto;
      height: auto;
      min-height: 100vh;
    }

    aside {
      width: 100%;
      min-width: unset;
      padding: 24px 20px;
      order: 2;
    }

    .sidebar-header h1 {
      font-size: 32px;
    }

    .roll-section {
      padding: 20px 0;
      order: 1;
    }

    .sidebar-header {
      order: 3;
    }

    .btn-row {
      order: 2;
    }

    .credit {
      order: 4;
    }

    .bowling-ball {
      width: 160px;
      height: 160px;
    }

    .btn-row {
      margin-bottom: 16px;
    }

    main {
      order: 1;
      padding: 16px;
      min-height: unset;
    }

    .poster-wrapper {
      width: 100%;
    }
  }
</style>
</head>

function fitPoster() {
  const main = document.querySelector('main');
  const isMobile = window.innerWidth <= 768;
  const pad = isMobile ? 32 : 80;
  const maxW = main.clientWidth - pad;
  const maxH = isMobile ? window.innerHeight * 0.7 : main.clientHeight - pad;
  const aspect = POSTER_W / POSTER_H;

  let displayW, displayH;
  if (maxW / maxH > aspect) {
    displayH = maxH;
    displayW = maxH * aspect;
  } else {
    displayW = maxW;
    displayH = maxW / aspect;
  }

  posterEl.style.width = displayW + 'px';
  posterEl.style.height = displayH + 'px';
  posterEl.dataset.scale = displayW / POSTER_W;
}

    svg.setAttribute('viewBox', vb);
    svg.setAttribute('width', w * scale);
    svg.setAttribute('height', h * scale);
    if (preserveAR) svg.setAttribute('preserveAspectRatio', preserveAR);
    else svg.setAttribute('preserveAspectRatio', 'none');
    svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    svg.style.position = 'absolute';
    svg.style.left = (x * scale) + 'px';
    svg.style.top = (y * scale) + 'px';
    if (cls) svg.classList.add(cls);
    if (id) svg.id = id;

    if (path) {
      const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      p.setAttribute('d', path);
      p.setAttribute('fill', fill || '#fff');
      svg.appendChild(p);

    return svg;

// ═══════════════════════════════════════════════════
// ROLL THE BALL — scatter pins
// ═══════════════════════════════════════════════════

// Preload strike sound
const strikeSound = new Audio('strike.mp3');
strikeSound.volume = 0.7;

function rollTheBall() {
  if (state.isAnimating) return;
  state.isAnimating = true;
  state.rollCount++;

  // Play strike sound
  strikeSound.currentTime = 0;
  strikeSound.play().catch(() => {});

  // Animate bowling ball
  const ball = document.getElementById('rollBtn');
  ball.classList.add('rolling');
  setTimeout(() => ball.classList.remove('rolling'), 600);

  const scale = parseFloat(posterEl.dataset.scale) || 1;

  // Generate random scatter — more dramatic, wilder rotations
  state.pinTransforms = PIN_DEFAULTS.map((_, i) => {
    const direction = (Math.random() - 0.5) * 2; // -1 to 1
    const intensity = 0.5 + Math.random() * 0.5;

    return {
      x: direction * (300 + Math.random() * 800) * intensity,
      y: (Math.random() - 0.6) * 600 * intensity,
      rotate: direction * (30 + Math.random() * 90) * intensity,
    };
  });

  // Apply transforms with animation
  const pins = document.querySelectorAll('.pin');
  pins.forEach((pin, i) => {
    pin.classList.add('scatter');
    const t = state.pinTransforms[i];
    pin.style.transform = `translate(${t.x * scale}px, ${t.y * scale}px) rotate(${t.rotate}deg)`;
  });

  setTimeout(() => {
    pins.forEach(p => p.classList.remove('scatter'));
    state.isAnimating = false;
  }, 1300);
}

// ═══════════════════════════════════════════════════
// RESET
// ═══════════════════════════════════════════════════

let resetTimer1 = null;
let resetTimer2 = null;

function resetPoster() {
  // Clear any pending timers from previous animations
  clearTimeout(resetTimer1);
  clearTimeout(resetTimer2);
  state.isAnimating = true;
  state.rollCount = 0;

  const scale = parseFloat(posterEl.dataset.scale) || 1;
  const pins = document.querySelectorAll('.pin');

  // Step 1: Lift pins up and fade out
  pins.forEach(pin => {
    pin.className = 'pin lift-out';
    pin.style.transform = `translate(0px, ${-800 * scale}px) rotate(0deg)`;
  });

  // Step 2: After lift-out completes, teleport pins above (instant)
  resetTimer1 = setTimeout(() => {
    pins.forEach(pin => {
      pin.className = 'pin above';
      pin.style.transform = `translate(0px, ${-500 * scale}px) rotate(0deg)`;
    });

    // Step 3: Drop pins into place (next frame so browser registers the position)
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        state.pinTransforms = PIN_DEFAULTS.map(() => ({ x: 0, y: 0, rotate: 0 }));
        pins.forEach(pin => {
          pin.className = 'pin drop-in';
          pin.style.transform = 'translate(0px, 0px) rotate(0deg)';
        });

        // Cleanup
        resetTimer2 = setTimeout(() => {
          pins.forEach(pin => { pin.className = 'pin'; });
          state.isAnimating = false;
        }, 900);
      });
    });
  }, 600);
}

// ═══════════════════════════════════════════════════
// EXPORT PNG at 3x
// ═══════════════════════════════════════════════════

function exportPNG() {
  const exportScale = 3;
  const w = POSTER_W * exportScale;
  const h = POSTER_H * exportScale;

  // Build a full SVG string for export
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${w}" height="${h}" viewBox="0 0 ${POSTER_W} ${POSTER_H}">`;
  svg += `<rect width="100%" height="100%" fill="#000"/>`;

  // Top letters
  TOP_LETTERS.forEach(l => {
    svg += `<svg x="${l.x}" y="${l.y}" width="${l.w}" height="${l.h}" viewBox="${l.vb}" preserveAspectRatio="none">`;
    svg += `<path d="${l.path}" fill="${l.fill}"/>`;
    svg += `</svg>`;
  });

  // Bottom letters
  BOT_LETTERS.forEach(l => {
    svg += `<svg x="${l.x}" y="${l.y}" width="${l.w}" height="${l.h}" viewBox="${l.vb}" preserveAspectRatio="none">`;
    svg += `<path d="${l.path}" fill="${l.fill}"/>`;
    svg += `</svg>`;
  });

  // Pins with transforms
  PIN_DEFAULTS.forEach((pin, i) => {
    const t = state.pinTransforms[i];
    const cx = pin.x + PIN_W / 2;
    const cy = pin.y + PIN_H;

    const patternId = 'exp-ht-' + i;
    svg += `<g transform="translate(${t.x}, ${t.y}) rotate(${t.rotate}, ${cx}, ${cy})">`;
    svg += `<svg x="${pin.x}" y="${pin.y}" width="${PIN_W}" height="${PIN_H}" viewBox="${PIN_VB}" preserveAspectRatio="none">`;
    svg += `<defs>`;
    svg += `<pattern id="${patternId}" patternUnits="userSpaceOnUse" patternTransform="matrix(-19.091 0 0 38.181 988.477 0)" preserveAspectRatio="none" viewBox="0 0 64.383 128.766" width="1" height="1">`;
    svg += `<circle cx="16.016" cy="16.016" r="16.016" fill="#FF1100"/>`;
    svg += `<circle cx="-48.367" cy="16.016" r="16.016" fill="#FF1100"/>`;
    svg += `<circle cx="-16.175" cy="80.399" r="16.016" fill="#FF1100"/>`;
    svg += `<circle cx="48.207" cy="80.399" r="16.016" fill="#FF1100"/>`;
    svg += `</pattern>`;
    svg += `</defs>`;
    svg += `<path d="${PIN_PATH}" fill="url(#${patternId})"/>`;
    svg += `</svg>`;
    svg += `</g>`;
  });

  // Header
  svg += `<svg x="${HEADER.x}" y="${HEADER.y}" width="${HEADER.w}" height="${HEADER.h}" viewBox="0 0 2116 119" preserveAspectRatio="none">`;
  svg += `<rect width="2116" height="119" rx="59.5" fill="#010101"/>`;
  svg += `<circle cx="62" cy="59" r="21" fill="#fff"/>`;
  svg += `<text x="100" y="72" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="600">All game.</text>`;
  svg += `<circle cx="870" cy="59" r="21" fill="#fff"/>`;
  svg += `<text x="910" y="72" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="600">No gutter.</text>`;
  svg += `<circle cx="1550" cy="59" r="21" fill="#fff"/>`;
  svg += `<text x="1590" y="72" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="600">April 29</text>`;
  svg += `<text x="1830" y="72" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="400">7-10 PM EST</text>`;
  svg += `</svg>`;

  // "and" badge
  svg += `<svg x="${AND_BADGE.x}" y="${AND_BADGE.y}" width="${AND_BADGE.w}" height="${AND_BADGE.h}" viewBox="0 0 51 51">`;
  svg += `<circle cx="25.143" cy="25.143" r="25.143" fill="#FFFFFF"/>`;
  svg += `<text x="25.143" y="30" text-anchor="middle" fill="#010101" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">and</text>`;
  svg += `</svg>`;

  svg += '</svg>';

  // Render to canvas
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');

  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0);
    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `jazzy-nova-roll-${state.rollCount}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 'image/png');
  };
  img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
}

// ═══════════════════════════════════════════════════
// EVENT LISTENERS
// ═══════════════════════════════════════════════════

document.getElementById('rollBtn').addEventListener('click', rollTheBall);
document.getElementById('resetBtn').addEventListener('click', resetPoster);
document.getElementById('exportBtn').addEventListener('click', exportPNG);

window.addEventListener('resize', () => {
  fitPoster();
  buildPoster();
});

// Keyboard shortcut: Space to roll
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !e.repeat) {
    e.preventDefault();
    rollTheBall();
  }
  if (e.code === 'KeyR' && !e.metaKey && !e.ctrlKey) {
    resetPoster();
  }
});

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════

fitPoster();
buildPoster();
</script>
